<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Issue Reporter | Report an Issue</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">&#128204; Community Issue Reporter</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="report.html" class="active">Report an Issue</a>
    <a href="submissions.html">Public Issue Log</a>
  </nav>
</header>

<main>
  <h1>Report an issue</h1>
  <p class="subtitle">Fill out the form below. All fields are required.</p>

  <div class="card">
    <form id="issueForm" novalidate>
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter your name">
        <div class="error-msg" id="nameError"></div>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email">
        <div class="error-msg" id="emailError"></div>
      </div>

      <div class="field">
        <label for="category">Issue type</label>
        <select id="category">
          <option value="Streetlight">Broken streetlight</option>
          <option value="Garbage">Garbage not collected</option>
          <option value="Pothole">Pothole / road damage</option>
          <option value="Water">Water supply issue</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="field">
        <label for="message">Description of the issue</label>
        <textarea id="message" placeholder="Describe the issue and its location"></textarea>
        <div class="error-msg" id="messageError"></div>
      </div>

      <button type="submit">Submit Report</button>
      <div class="status-msg" id="statusMsg"></div>
    </form>
  </div>
</main>

<footer>Community Issue Reporter &mdash; built for Full Stack Web Development Internship, Task 3.</footer>

<script src="script.js"></script>
</body>
</html>
